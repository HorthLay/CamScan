<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamScan – Face Search & Identification</title>
    <!-- Google Fonts: Plus Jakarta Sans for a clean, tech-premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #080c14;
            --bg-panel: rgba(15, 23, 42, 0.65);
            --border-panel: rgba(255, 255, 255, 0.08);
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.4);
            --danger: #f43f5e;
            --danger-glow: rgba(244, 63, 94, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(79, 70, 229, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
        }

        header {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-panel);
            background: rgba(8, 12, 20, 0.8);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--success));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            font-size: 16px;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-panel);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .status-dot.idle {
            background-color: #e2e8f0;
            box-shadow: 0 0 8px rgba(226, 232, 240, 0.5);
        }

        .status-dot.scanning {
            background-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            animation: pulse-dot 1.5s infinite;
        }

        .status-dot.success {
            background-color: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .status-dot.danger {
            background-color: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        main {
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 32px 40px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 32px;
        }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border-panel);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: border-color var(--transition-speed);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            transition: background var(--transition-speed);
        }

        .card.match-success {
            border-color: rgba(16, 185, 129, 0.3);
        }
        .card.match-success::before {
            background: var(--success);
        }

        .card.match-failed {
            border-color: rgba(244, 63, 94, 0.3);
        }
        .card.match-failed::before {
            background: var(--danger);
        }

        .card.scanning-active {
            border-color: rgba(79, 70, 229, 0.3);
        }
        .card.scanning-active::before {
            background: var(--primary);
        }

        .section-title {
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* ── Camera Panel ── */
        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 12px;
            overflow: hidden;
            background: #020617;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
        }

        .camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .scanner-line {
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--primary), transparent);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 2s linear infinite;
            box-shadow: 0 0 8px var(--primary);
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .scan-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            border: 2px dashed rgba(79, 70, 229, 0.4);
            border-radius: 8px;
            animation: pulse-frame 2s infinite ease-in-out;
        }

        @keyframes pulse-frame {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.95); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.02); }
        }

        .controls {
            margin-top: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn-search {
            flex: 1;
            background: linear-gradient(135deg, var(--primary), #4338ca);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 28px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            transition: all var(--transition-speed);
        }

        .btn-search:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5);
            background: linear-gradient(135deg, #5a52ff, #4f46e5);
        }

        .btn-search:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn-search:disabled {
            background: #1e293b;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-search svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* ── Results Panel ── */
        .results-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex: 1;
        }

        .match-badge-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .match-badge {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .match-badge.standby {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border-panel);
        }

        .match-badge.success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }

        .match-badge.danger {
            background: rgba(244, 63, 94, 0.15);
            color: var(--danger);
            border: 1px solid rgba(244, 63, 94, 0.3);
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.1);
        }

        .match-badge.loading {
            background: rgba(79, 70, 229, 0.15);
            color: var(--primary);
            border: 1px solid rgba(79, 70, 229, 0.3);
        }

        /* Comparison Images */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 8px;
        }

        .img-box {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid var(--border-panel);
            overflow: hidden;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s;
        }

        .img-box .placeholder-text {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            padding: 20px;
        }

        .img-box .box-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Confidence Meter */
        .confidence-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(255, 255, 255, 0.02);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-panel);
        }

        .confidence-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .confidence-value {
            font-weight: 700;
            color: var(--text-main);
        }

        .meter-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.1, 0.8, 0.25, 1);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* Profile Details Table/Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-key {
            color: var(--text-muted);
            font-weight: 500;
        }

        .info-val {
            font-weight: 600;
            color: var(--text-main);
            text-align: right;
            max-width: 65%;
            word-break: break-word;
        }

        .info-val.highlight {
            color: #6366f1;
            font-size: 16px;
            font-weight: 700;
        }

        @media (max-width: 992px) {
            main {
                grid-template-columns: 1fr;
                padding: 20px;
                gap: 24px;
            }
            header {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-area">
            <div class="logo-icon">CS</div>
            <div>
                <h1>CamScan Identification</h1>
            </div>
        </div>
        <div class="system-status">
            <span id="statusIndicatorDot" class="status-dot idle"></span>
            <span id="statusIndicatorText">SYSTEM READY</span>
        </div>
    </header>

    <main>
        <!-- Camera Area -->
        <section class="card" id="cameraCard">
            <div class="section-title">
                <span>Live Surveillance Terminal</span>
                <span id="cameraLabel" style="font-size: 12px; color: var(--success);">ONLINE</span>
            </div>
            
            <div class="camera-container">
                <img class="camera-feed" src="http://127.0.0.1:8001/video_feed" alt="Live camera feed">
                <div class="scanner-overlay" id="scannerOverlay">
                    <div class="scanner-line"></div>
                    <div class="scan-pulse"></div>
                </div>
            </div>

            <div class="controls">
                <button class="btn-search" id="searchButton" type="button">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                    <span>SEARCH & IDENTIFY FACE</span>
                </button>
            </div>
        </section>

        <!-- Results Area -->
        <section class="card" id="resultsCard">
            <div class="section-title">
                <span>Identification Analysis</span>
                <div class="match-badge-container">
                    <span id="matchBadge" class="match-badge standby">STANDBY</span>
                </div>
            </div>

            <div class="results-container">
                <!-- Comparison Images -->
                <div class="comparison-grid">
                    <!-- Stored DB Profile Image -->
                    <div class="img-box" id="dbImageBox">
                        <img id="dbProfileImage" style="display: none;" alt="DB Profile Image">
                        <div id="dbImagePlaceholder" class="placeholder-text">
                            Stored DB Image
                        </div>
                        <div class="box-label">Database Record</div>
                    </div>

                    <!-- Captured Webcam Image -->
                    <div class="img-box" id="capturedImageBox">
                        <img id="capturedImage" style="display: none;" alt="Captured Face Preview">
                        <div id="capturedImagePlaceholder" class="placeholder-text">
                            No Capture Yet
                        </div>
                        <div class="box-label">Surveillance Capture</div>
                    </div>
                </div>

                <!-- Confidence Match Meter -->
                <div class="confidence-section">
                    <div class="confidence-label">
                        <span>Match Confidence</span>
                        <span class="confidence-value" id="confidenceValue">0%</span>
                    </div>
                    <div class="meter-bar">
                        <div class="meter-fill" id="meterFill"></div>
                    </div>
                </div>

                <!-- User Meta Grid -->
                <div class="info-grid">
                    <div class="info-row">
                        <span class="info-key">Full Name</span>
                        <span class="info-val highlight" id="userName">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-key">Suggested Position / Role</span>
                        <span class="info-val" id="userPosition">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-key">Age / Gender</span>
                        <span class="info-val" id="userAgeGender">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-key">System User ID</span>
                        <span class="info-val" id="userID">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-key">AI Notes / Vision Diagnosis</span>
                        <span class="info-val" id="userNotes">-</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = "http://127.0.0.1:8001";
        const searchButton = document.getElementById("searchButton");
        const scannerOverlay = document.getElementById("scannerOverlay");
        const cameraCard = document.getElementById("cameraCard");
        const resultsCard = document.getElementById("resultsCard");
        const statusIndicatorDot = document.getElementById("statusIndicatorDot");
        const statusIndicatorText = document.getElementById("statusIndicatorText");
        
        // Match Badge Elements
        const matchBadge = document.getElementById("matchBadge");
        
        // Image Elements
        const dbProfileImage = document.getElementById("dbProfileImage");
        const dbImagePlaceholder = document.getElementById("dbImagePlaceholder");
        const capturedImage = document.getElementById("capturedImage");
        const capturedImagePlaceholder = document.getElementById("capturedImagePlaceholder");
        
        // Meter Elements
        const confidenceValue = document.getElementById("confidenceValue");
        const meterFill = document.getElementById("meterFill");
        
        // Details Elements
        const userName = document.getElementById("userName");
        const userPosition = document.getElementById("userPosition");
        const userAgeGender = document.getElementById("userAgeGender");
        const userID = document.getElementById("userID");
        const userNotes = document.getElementById("userNotes");

        // Web Audio Countdown beep
        function playCountdown() {
            return new Promise((resolve, reject) => {
                const audio = new Audio(`${API_BASE}/register/countdown-audio?ts=${Date.now()}`);
                audio.addEventListener("ended", resolve, { once: true });
                audio.addEventListener("error", reject, { once: true });
                audio.play().catch(reject);
            });
        }

        // Web Audio UI Sound generator
        function playUIAudio(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'success') {
                    // Quick double high-beep
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.1);
                    
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.frequency.setValueAtTime(1320, ctx.currentTime + 0.15);
                    gain2.gain.setValueAtTime(0.1, ctx.currentTime + 0.15);
                    osc2.start(ctx.currentTime + 0.15);
                    osc2.stop(ctx.currentTime + 0.3);
                } else if (type === 'fail') {
                    // Low buzzing error tone
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.35);
                }
            } catch (e) {
                console.warn("Could not play sound: ", e);
            }
        }

        searchButton.addEventListener("click", async () => {
            // Disable search button and reset UI states
            searchButton.disabled = true;
            scannerOverlay.style.display = "block";
            
            // Set scanning state
            cameraCard.className = "card scanning-active";
            resultsCard.className = "card scanning-active";
            statusIndicatorDot.className = "status-dot scanning";
            statusIndicatorText.textContent = "SURVEILLANCE COUNTDOWN";
            
            matchBadge.className = "match-badge loading";
            matchBadge.textContent = "SCANNING...";

            try {
                // Play audio countdown
                await playCountdown();
                
                statusIndicatorText.textContent = "PROCESSING MATCH...";
                
                // Fetch search capture
                const response = await fetch(`${API_BASE}/register/search?server_countdown=false`, {
                    method: "POST",
                });
                
                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.detail || "Surveillance capture failed");
                }

                // Show Surveillance Capture Image
                capturedImage.src = `data:image/jpeg;base64,${data.image_base64}`;
                capturedImage.style.display = "block";
                capturedImagePlaceholder.style.display = "none";

                if (data.matched && data.user) {
                    // SUCCESS - MATCH FOUND
                    playUIAudio('success');
                    
                    cameraCard.className = "card match-success";
                    resultsCard.className = "card match-success";
                    statusIndicatorDot.className = "status-dot success";
                    statusIndicatorText.textContent = "ACCESS GRANTED";
                    
                    matchBadge.className = "match-badge success";
                    matchBadge.textContent = "USER MATCHED";

                    // Load DB Image if available
                    if (data.user.face_image) {
                        dbProfileImage.src = `${API_BASE}/${data.user.face_image}?ts=${Date.now()}`;
                        dbProfileImage.style.display = "block";
                        dbImagePlaceholder.style.display = "none";
                    } else {
                        dbProfileImage.style.display = "none";
                        dbImagePlaceholder.textContent = "No Stored Photo";
                        dbImagePlaceholder.style.display = "block";
                    }

                    // Confidence Score
                    const confPct = Math.round(data.user.confidence * 100);
                    confidenceValue.textContent = `${confPct}%`;
                    meterFill.style.width = `${confPct}%`;

                    // Metadata
                    userName.textContent = data.user.name || "Unknown User";
                    userPosition.textContent = data.user.position || "Not Assigned";
                    
                    const age = data.user.age || "-";
                    const gender = data.user.gender || "-";
                    userAgeGender.textContent = `${age} / ${gender}`;
                    
                    userID.textContent = `#${data.user.id}`;
                    userNotes.textContent = data.user.ai_notes || "No system notes recorded.";

                } else {
                    // FAILURE - NO MATCH FOUND
                    playUIAudio('fail');
                    
                    cameraCard.className = "card match-failed";
                    resultsCard.className = "card match-failed";
                    statusIndicatorDot.className = "status-dot danger";
                    statusIndicatorText.textContent = "ACCESS DENIED";
                    
                    matchBadge.className = "match-badge danger";
                    matchBadge.textContent = "UNKNOWN FACE";

                    // Hide DB Image
                    dbProfileImage.style.display = "none";
                    dbImagePlaceholder.textContent = "Access Denied";
                    dbImagePlaceholder.style.display = "block";

                    // Confidence Score
                    confidenceValue.textContent = `0%`;
                    meterFill.style.width = `0%`;

                    // Clear Metadata
                    userName.textContent = "ACCESS DENIED";
                    userPosition.textContent = "UNAUTHORIZED PERSONNEL";
                    userAgeGender.textContent = "-";
                    userID.textContent = "N/A";
                    userNotes.textContent = "This face is not registered in the central user directory.";
                }
            } catch (error) {
                console.error(error);
                statusIndicatorDot.className = "status-dot danger";
                statusIndicatorText.textContent = "SYSTEM ERROR";
                matchBadge.className = "match-badge danger";
                matchBadge.textContent = "ERROR";
                
                userName.textContent = "SCAN ERROR";
                userNotes.textContent = error.message || "An unknown hardware or server error occurred.";
                playUIAudio('fail');
            } finally {
                searchButton.disabled = false;
                scannerOverlay.style.display = "none";
            }
        });
    </script>
</body>
</html>
